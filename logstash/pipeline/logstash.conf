input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Parse timestamp
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Add severity field for Kibana filtering
  if [level] == "error" {
    mutate { add_field => { "severity" => "ERROR" } }
  } else if [level] == "warn" {
    mutate { add_field => { "severity" => "WARN" } }
  } else {
    mutate { add_field => { "severity" => "INFO" } }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "app-logs-%{+YYYY.MM.dd}"
  }

  # Also output to stdout for debugging
  stdout {
    codec => rubydebug
  }
}
